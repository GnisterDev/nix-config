name: flake-check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  nix-check:
    name: nix-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: nix flake check
        run: nix flake check --print-build-logs --no-update-lock-file